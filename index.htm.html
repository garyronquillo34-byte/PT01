<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #4CAF50;
      color: white;
      padding: 20px 0;
    }
    h1, h2 {
      margin: 10px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
      gap: 20px;
    }
    .gallery img {
      width: 150px;
      height: auto;
      border: 2px solid #ddd;
      border-radius: 8px;
      transition: transform 0.2s;
    }
    .gallery img:hover {
      transform: scale(1.1);
      border-color: #4CAF50;
    }
    footer {
      background-color: #333;
      color: white;
      padding: 10px 0;
      position: fixed;
      width: 100%;
      bottom: 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome</h1>
    <h2>Logo Gallery</h2>
  </header>

  <section class="gallery">
    <img src="https://raw.githubusercontent.com/garyronquillo34-byte/PT01/main/images/logo1.png" alt="Logo 1">
    <img src="https://raw.githubusercontent.com/garyronquillo34-byte/PT01/main/images/logo2.png" alt="Logo 2">
    <img src="https://raw.githubusercontent.com/garyronquillo34-byte/PT01/main/images/logo3.png" alt="Logo 3">
    <img src="https://raw.githubusercontent.com/garyronquillo34-byte/PT01/main/images/logo4.png" alt="Logo 4">
  </section>

  <footer>
    © 2026 BSIT G. Ronquillo
  </footer>

</body>
</html>
