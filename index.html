<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #4CAF50;
      color: white;
      padding: 20px 0;
    }
    h1, h2 {
      margin: 10px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
      gap: 20px;
    }
    .gallery img {
      width: 150px;
      height: auto;
      border: 2px solid #ddd;
      border-radius: 8px;
      transition: transform 0.2s;
    }
    .gallery img:hover {
      transform: scale(1.1);
      border-color: #4CAF50;
    }
    footer {
      background-color: #333;
      color: white;
      padding: 10px 0;
      position: fixed;
      width: 100%;
      bottom: 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome</h1>
    <h2>Logo Gallery</h2>
  </header>

  <section class="gallery" id="gallery"></section>

  <footer>
    © 2026 BSIT G. Ronquillo
  </footer>

  <script>
    // Replace this with your GitHub repo details
    const user = "garyronquillo34-byte";
    const repo = "PT01";
    const folder = "images";

    // GitHub API URL to list folder contents
    const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/${folder}`;

    fetch(apiUrl)
      .then(response => response.json())
      .then(data => {
        const gallery = document.getElementById('gallery');
        data.forEach(file => {
          if(file.download_url && file.name.match(/\.(png|jpg|jpeg|gif)$/i)) {
            const img = document.createElement('img');
            img.src = file.download_url;
            img.alt = file.name;
            gallery.appendChild(img);
          }
        });
      })
      .catch(error => console.error("Error loading images:", error));
  </script>

</body>
</html>
